<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kodbank - Register</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="auth-bg">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
            <line x1="1" y1="10" x2="23" y2="10"></line>
            <line x1="7" y1="4" x2="7" y2="10"></line>
            <line x1="17" y1="4" x2="17" y2="10"></line>
          </svg>
        </div>
        <h1>Kodbank</h1>
        <h2>Create your account and get started</h2>
      </div>

      <form id="registerForm">
        <div class="field auth-field">
          <label for="uid">UID</label>
          <div class="auth-field-with-icon">
            <div class="field-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
              </svg>
            </div>
            <input type="number" id="uid" name="uid" placeholder="Unique ID" required />
          </div>
        </div>
        <div class="field auth-field">
          <label for="uname">Username</label>
          <div class="auth-field-with-icon">
            <div class="field-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </div>
            <input type="text" id="uname" name="uname" placeholder="Choose a username" required />
          </div>
        </div>
        <div class="field auth-field">
          <label for="password">Password</label>
          <div class="auth-field-with-icon">
            <div class="field-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </div>
            <input type="password" id="password" name="password" placeholder="Create a password" required />
          </div>
        </div>
        <div class="field auth-field">
          <label for="email">Email</label>
          <div class="auth-field-with-icon">
            <div class="field-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
            </div>
            <input type="email" id="email" name="email" placeholder="your@email.com" required />
          </div>
        </div>
        <div class="field auth-field">
          <label for="phone">Phone</label>
          <div class="auth-field-with-icon">
            <div class="field-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
              </svg>
            </div>
            <input type="tel" id="phone" name="phone" placeholder="Phone number" required />
          </div>
        </div>
        <div class="field auth-field">
          <label for="role">Role</label>
          <div class="auth-field-with-icon">
            <div class="field-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
              </svg>
            </div>
            <select id="role" name="role">
              <option value="Customer" selected>Customer</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn primary">Create Account</button>
      </form>

      <p class="helper">
        Already have an account? <a href="/login.html">Sign in</a>
      </p>
      <p id="registerMessage" class="message"></p>

      <div class="auth-features">
        <span class="auth-feature">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Secure
        </span>
        <span class="auth-feature">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          ₹100k Welcome
        </span>
        <span class="auth-feature">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          AI Assistant
        </span>
      </div>
    </div>
    <script src="register.js"></script>
  </body>
</html>
